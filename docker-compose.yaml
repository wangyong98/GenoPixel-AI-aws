# Local development only — runs the GenoPixel tool server for testing.
# Open WebUI and Caddy are not part of the AWS architecture.
# In production, the tool server logic runs inside the AgentCore Runtime container.
services:
  genopixel_tool_server:
    image: genopixel:latest
    build:
      context: ./Docker/genopixel
      dockerfile: Dockerfile
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "-X",
          "POST",
          "${GENOPIXEL_TOOL_HEALTH_SERV_BASEURL}",
          "-H",
          "accept: application/json",
          "-H",
          "Authorization: Bearer ${GENOPIXEL_TOOL_API_KEY}",
          "-H",
          "Content-Type: application/json",
          "-d",
          "{}",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "7"
          memory: ${GENOPIXEL_TOOL_MEMORY_LIMIT}
    volumes:
      - $PWD:/data
      - $PWD:/code
      - /Volumes/cx10/Single_cell_data_0117_2026:/Volumes/cx10/Single_cell_data_0117_2026:ro
    restart: unless-stopped
    environment:
      - PORT=${GENOPIXEL_TOOL_PORT}
      - API_KEY=${GENOPIXEL_TOOL_API_KEY}
      - METADATA_XLSX=${GENOPIXEL_METADATA_XLSX}
      - H5AD_BASE_DIR=${GENOPIXEL_H5AD_BASE_DIR}
      - OUTPUT_DIR=${GENOPIXEL_OUTPUT_DIR}
      - DEFAULT_BACKED=${GENOPIXEL_DEFAULT_BACKED}
      - MPLBACKEND=Agg
    ports:
      - "${GENOPIXEL_TOOL_PORT}:${GENOPIXEL_TOOL_PORT}"
    command: sh -c 'python -m uvicorn gp_catalog_api:app --host 0.0.0.0 --port $$PORT --app-dir /code/Docker/genopixel'

networks:
  default:
    driver: bridge
