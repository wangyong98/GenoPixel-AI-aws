stack_name_base: genopixel

# Auto-creates admin user and emails temporary credentials on first deploy.
admin_user_email: wangyong98@hotmail.com

# Custom domain for redirect_uri and CORS (omit to use the raw Amplify URL).
custom_domain: www.genopixel.com

backend:
  # strands-* prefix → Strands parser in the React frontend
  pattern: strands-genopixel-agent
  # Runtime model ID (exposed to agent as BEDROCK_MODEL_ID)
  model_id: us.anthropic.claude-haiku-4-5-20251001-v1:0
  deployment_type: docker        # required: native C libs (HDF5, OpenBLAS) need a container
  network_mode: VPC              # required: AgentCore Runtime must reach EFS

  # VPC and subnets pinned from first deploy (2026-04-17).
  # EFS filesystem: fs-09aa96b697a5a2bb0  (stored in SSM /genopixel/efs-filesystem-id)
  # S3 data bucket: genopixel-data-714262955850
  # Catalog API:    https://quuwq6albh.execute-api.us-east-1.amazonaws.com/prod/
  vpc:
    vpc_id: vpc-0ed39ba0c59ad7747
    subnet_ids:
      - subnet-0efec5aa239ec6b60
      - subnet-00cf6280dbff25d06
